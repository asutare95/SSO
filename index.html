<!DOCTYPE html>
<html lang="en">

<head>
    <title>Contoso Sample Web Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">

    <script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>
    <script type="text/javascript" src="https://alcdn.msauth.net/browser/2.32.0/js/msal-browser.min.js"></script>
    <script type="text/javascript">
        if (typeof msal === 'undefined') document.write(unescape("%3Cscript src='https://alcdn.msftauth.net/browser/2.32.0/js/msal-browser.min.js' type='text/javascript' %3E%3C/script%3E"));
    </script>

    <style>
        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "Segoe UI Web (West European)", "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #header {
            background-color: rgb(11, 85, 106);
            color: rgb(255, 255, 255);
            font-weight: 600;
            height: 48px;
            padding: 0px 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #subheader {
            background-color: rgb(243, 242, 241);
            padding: 7px 13px;
            font-size: 12px;
            font-weight: 400;
        }

        a {
            color: rgb(0, 90, 158);
        }

        a:hover {
            color: rgb(0, 69, 120);
        }

        #webchat {
            position: fixed;
            height: calc(100% - 75px);
            width: 100%;
            top: 75px;
            overflow: hidden;
        }

        #logout {
            display: none;
        }
    </style>
</head>

<body>
    <div id="chatwindow">
        <div id="header">
            SSO Test Bot
        </div>
        <div id="subheader">
            <span id="loginStatus">You are not logged in on the website.</span>
            <a id="login" href="#" onclick="onSignInClick(); return false;">Log in</a>
            <a id="logout" href="#" onclick="onSignOutClick(); return false;">Log out</a>
        </div>

        <div id="webchat"></div>
    </div>

    <script>
        const clientId = "f42176f2-a53c-4cc2-8289-d3436f529865";
        const tenantId = "4ab533c3-7284-424a-8124-27c7420a3d90";
        const redirectUri = "https://asutare95.github.io/SSO/";
        const tokenEndpoint = "https://3a10aa35e0c8ea24a1effac43d05bf.89.environment.api.powerplatform.com/powervirtualagents/botsbyschema/copilots_header_cr70c_agent1pTQ8VU/directline/token?api-version=2022-03-01-preview";

        const msalConfig = {
            auth: {
                clientId: clientId,
                authority: "https://login.microsoftonline.com/" + tenantId,
                redirectUri: redirectUri
            },
            cache: {
                cacheLocation: "sessionStorage",
                storeAuthStateInCookie: false
            }
        };

        const loginRequest = {
            scopes: ["User.Read", "openid", "profile"]
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        let user = null;
        let webChatRendered = false;

        function updateLoginUI(account) {
            if (account) {
                user = account;
                msalInstance.setActiveAccount(account);
                document.getElementById("loginStatus").innerHTML =
                    "Currently logged in as " + (account.name || account.username) + " on the website.";
                document.getElementById("login").style.display = "none";
                document.getElementById("logout").style.display = "inline";
            } else {
                user = null;
                document.getElementById("loginStatus").innerHTML = "You are not logged in on the website.";
                document.getElementById("login").style.display = "inline";
                document.getElementById("logout").style.display = "none";
            }
        }

        async function onSignInClick() {
            try {
                const loginResponse = await msalInstance.loginPopup(loginRequest);
                const account = loginResponse.account || msalInstance.getAllAccounts()[0];
                updateLoginUI(account);
                await renderChatWidget();
            } catch (err) {
                console.log("Interactive login failed:", err);
            }
        }

        async function onSignOutClick() {
            try {
                await msalInstance.logoutPopup({ account: user });
            } catch (err) {
                console.log("Logout failed:", err);
            }
            location.reload();
        }

        async function tryAutoLogin() {
            const accounts = msalInstance.getAllAccounts();
            if (accounts.length > 0) {
                updateLoginUI(accounts[0]);
                return true;
            }

            try {
                const silentResponse = await msalInstance.ssoSilent({
                    ...loginRequest,
                    redirectUri: redirectUri
                });
                const account = silentResponse.account || msalInstance.getAllAccounts()[0];
                if (account) {
                    updateLoginUI(account);
                    return true;
                }
            } catch (err) {
                console.log("Silent SSO failed:", err);
            }

            updateLoginUI(null);
            return false;
        }

        function getOAuthCardResourceUri(activity) {
            if (activity &&
                activity.attachments &&
                activity.attachments[0] &&
                activity.attachments[0].contentType === 'application/vnd.microsoft.card.oauth' &&
                activity.attachments[0].content.tokenExchangeResource) {
                return activity.attachments[0].content.tokenExchangeResource.uri;
            }
        }

        async function exchangeTokenAsync(resourceUri) {
            const accounts = msalInstance.getAllAccounts();
            if (accounts.length <= 0) {
                return null;
            }

            const tokenRequest = {
                scopes: [resourceUri],
                account: msalInstance.getActiveAccount() || accounts[0]
            };

            try {
                const tokenResponse = await msalInstance.acquireTokenSilent(tokenRequest);
                return tokenResponse.accessToken;
            } catch (err) {
                console.log(err);
                return null;
            }
        }

        async function fetchJSON(url, options = {}) {
            const res = await fetch(url, {
                ...options,
                headers: {
                    ...options.headers,
                    accept: 'application/json'
                }
            });

            if (!res.ok) {
                throw new Error(`Failed to fetch JSON due to ${res.status}`);
            }

            return await res.json();
        }

        async function renderChatWidget() {
            if (webChatRendered) {
                return;
            }

            const userID = user?.localAccountId != null
                ? user.localAccountId.substr(0, 36)
                : (Math.random().toString() + Date.now().toString()).substr(0, 64);

            const { token } = await fetchJSON(tokenEndpoint);
            const directLine = window.WebChat.createDirectLine({ token });

            const store = WebChat.createStore(
                {},
                ({ dispatch }) => next => action => {
                    if (action.type === "DIRECT_LINE/CONNECT_FULFILLED") {
                        dispatch({
                            meta: { method: "keyboard" },
                            payload: {
                                activity: {
                                    channelData: { postBack: true },
                                    name: 'startConversation',
                                    type: "event"
                                }
                            },
                            type: "DIRECT_LINE/POST_ACTIVITY"
                        });
                    }

                    if (action.type === 'DIRECT_LINE/INCOMING_ACTIVITY') {
                        const activity = action.payload.activity;
                        let resourceUri;

                        if (activity.from && activity.from.role === 'bot' && (resourceUri = getOAuthCardResourceUri(activity))) {
                            exchangeTokenAsync(resourceUri).then((token) => {
                                if (token) {
                                    directLine.postActivity({
                                        type: 'invoke',
                                        name: 'signin/tokenExchange',
                                        value: {
                                            id: activity.attachments[0].content.tokenExchangeResource.id,
                                            connectionName: activity.attachments[0].content.connectionName,
                                            token
                                        },
                                        from: {
                                            id: userID,
                                            name: user?.name || user?.username || 'User',
                                            role: 'user'
                                        }
                                    }).subscribe(
                                        id => {
                                            if (id === 'retry') {
                                                return next(action);
                                            }
                                        },
                                        error => {
                                            console.log('Token exchange invoke failed:', error);
                                            return next(action);
                                        }
                                    );
                                    return;
                                }

                                return next(action);
                            });
                            return;
                        }
                    }

                    return next(action);
                }
            );

            const styleOptions = {
                hideUploadButton: true,
                botAvatarImage: 'https://bot-framework.azureedge.net/bot-icons-v1/6ab9b101-b65c-4357-9e9f-915cbf313a14_2K5Bt02aW8egEb97fxAgh7vqChK4UV3Nh3Lw3YYArhEKR8mB.png',
                botAvatarInitials: 'Bot',
                userAvatarImage: 'https://content.powerapps.com/resource/makerx/static/media/user.0d06c38a.svg',
                userAvatarInitials: 'User'
            };

            window.WebChat.renderWebChat(
                {
                    directLine,
                    store,
                    userID,
                    styleOptions
                },
                document.getElementById('webchat')
            );

            webChatRendered = true;
        }

        (async () => {
            const loggedIn = await tryAutoLogin();
            if (loggedIn) {
                await renderChatWidget();
            }
            console.log('Auto login result:', loggedIn);
        })();
    </script>
</body>

</html>
